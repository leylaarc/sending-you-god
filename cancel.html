<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Canceled — Sending You God</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a href="/" class="logo" aria-label="Sending You God home">
        <svg class="logo-mark" width="14" height="18" viewBox="0 0 14 18" fill="none" aria-hidden="true">
          <rect x="5.5" y="0" width="3" height="18" rx="0.5" fill="currentColor"/>
          <rect x="0" y="4.5" width="14" height="3" rx="0.5" fill="currentColor"/>
        </svg>
        Sending You God
      </a>
    </nav>
  </header>

  <main class="checkout-result">
    <div class="container checkout-result-inner">
      <p class="eyebrow">Checkout Canceled</p>
      <h1>No worries.<br><em>We're still here.</em></h1>
      <p class="checkout-result-lead">
        Your order wasn't completed. Whenever you're ready, we'd love to send a cross — for you or someone you love.
      </p>
      <a href="/#order" class="btn btn-primary">Return to Order</a>
    </div>
  </main>
</body>
</html>
